<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛있는 급식 순서 관리</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f9fbfd;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        /* 외부 차단 없는 고화질 이모지 일러스트 영역 */
        .character-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        .child-img {
            width: 90px;
            height: 90px;
            animation: nodHead 2s ease-in-out infinite alternate;
        }
        .child-img:nth-child(2) {
            animation-delay: 0.5s;
        }
        @keyframes nodHead {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* 입력 및 테이블 스타일 */
        .admin-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        input, button {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin: 0 5px;
        }
        button {
            background-color: #4dabf7;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #339af0; }

        .table-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f1f3f5;
            color: #495057;
        }
        
        /* 상태별 버튼 스타일 */
        .status-btn {
            padding: 6px 10px;
            margin: 2px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #dee2e6;
            background-color: #fff;
            color: #868e96;
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-btn.active[data-status="교실 대기 중"] { background-color: #e9ecef; color: #495057; font-weight: bold; }
        .status-btn.active[data-status="줄서는 중"] { background-color: #ffd43b; color: #000; font-weight: bold; }
        .status-btn.active[data-status="식사 중"] { background-color: #51cf66; color: #fff; font-weight: bold; }
        .status-btn.active[data-status="식사 완료"] { background-color: #38d9a9; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <h1>맛있는 급식</h1>

    <div class="character-container">
        <img class="child-img" src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f466_1f3fb/512.webp" alt="소년">
        <img class="child-img" src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f467_1f3fb/512.webp" alt="소녀">
    </div>

    <div class="admin-box">
        <input type="number" id="gradeInput" placeholder="학년 (예: 1)" min="1" max="6">
        <input type="number" id="classInput" placeholder="반 (예: 3)" min="1">
        <button onclick="addClass()">학반 추가</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">학반</th>
                    <th style="width: 70%;">급식 현황</th>
                </tr>
            </thead>
            <tbody id="statusTableBody">
                </tbody>
        </table>
    </div>

    <script>
        const socket = io(window.location.origin, {
            transports: ['websocket', 'polling']
        });
        
        const statuses = ["교실 대기 중", "줄서는 중", "식사 중", "식사 완료"];

        // 소켓이 연결 성공하면 확실하게 데이터를 달라고 서버에 한 번 더 요청합니다.
        socket.on('connect', () => {
            console.log('서버 연결 성공!');
            socket.emit('request_initial_data');
        });

        function addClass() {
            const grade = document.getElementById('gradeInput').value;
            const className = document.getElementById('classInput').value;
            if(!grade || !className) return alert('학년과 반을 입력해주세요.');
            
            socket.emit('add_class', { grade, className });
            document.getElementById('gradeInput').value = '';
            document.getElementById('classInput').value = '';
        }

        function changeStatus(id, status) {
            socket.emit('change_status', { id, status });
        }

        socket.on('initial_data', (data) => {
            const tbody = document.getElementById('statusTableBody');
            tbody.innerHTML = '';

            const sortedKeys = Object.keys(data).sort((a, b) => {
                return data[a].grade - data[b].grade || data[a].class - data[b].class;
            });

            sortedKeys.forEach(id => {
                const item = data[id];
                const tr = document.createElement('tr');
                
                let buttonsHtml = statuses.map(st => {
                    const activeClass = item.status === st ? 'active' : '';
                    return `<button class="status-btn ${activeClass}" data-status="${st}" onclick="changeStatus('${id}', '${st}')">${st}</button>`;
                }).join('');

                tr.innerHTML = `
                    <td><strong>${item.grade}학년 ${item.class}반</strong></td>
                    <td>${buttonsHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        socket.on('status_updated', (data) => {
            const { id, status } = data;
            const buttons = document.querySelectorAll(`button[onclick^="changeStatus('${id}'"]`);
            buttons.forEach(btn => {
                if(btn.getAttribute('data-status') === status) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛있는 급식 순서 관리</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f9fbfd;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #333;
        }
        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        /* 귀여운 아이들 이미지 애니메이션 영역 */
        .character-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .child-img {
            width: 110px; /* 이미지 크기 적절하게 조절 */
            height: auto;
            animation: nodHead 2s ease-in-out infinite alternate;
        }
        .child-img:nth-child(2) {
            animation-delay: 0.5s; /* 엇박자로 움직이도록 설정 */
        }
        @keyframes nodHead {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        /* 입력 및 테이블 스타일 */
        .admin-box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        input, button {
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin: 0 5px;
        }
        button {
            background-color: #4dabf7;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background-color: #339af0; }

        .table-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f1f3f5;
            color: #495057;
        }
        
        /* 상태별 버튼 스타일 */
        .status-btn {
            padding: 6px 10px;
            margin: 2px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid #dee2e6;
            background-color: #fff;
            color: #868e96;
            cursor: pointer;
            transition: all 0.2s;
        }
        .status-btn.active[data-status="교실 대기 중"] { background-color: #e9ecef; color: #495057; font-weight: bold; }
        .status-btn.active[data-status="줄서는 중"] { background-color: #ffd43b; color: #000; font-weight: bold; }
        .status-btn.active[data-status="식사 중"] { background-color: #51cf66; color: #fff; font-weight: bold; }
        .status-btn.active[data-status="식사 완료"] { background-color: #38d9a9; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <h1>맛있는 급식</h1>

    <div class="character-container">
        <img class="child-img" src="https://images.crowdpic.net/detail-thumb/thumb_d_265FB4EA534005DFE922CD004240375E.png" alt="식판 든 남자아이">
        <img class="child-img" src="https://images.crowdpic.net/detail-thumb/thumb_d_8670A88FFBE8B1D45D5D1875A67D25DA.png" alt="식판 든 여자아이">
    </div>

    <div class="admin-box">
        <input type="number" id="gradeInput" placeholder="학년 (예: 1)" min="1" max="6">
        <input type="number" id="classInput" placeholder="반 (예: 3)" min="1">
        <button onclick="addClass()">학반 추가</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">학반</th>
                    <th style="width: 70%;">급식 현황</th>
                </tr>
            </thead>
            <tbody id="statusTableBody">
